# ── BOTTOM LEFT: SYSTEM STATS ───────────────────────
label {
  monitor =
  text = cmd[update:5000] echo "CPU  // $(grep 'cpu ' /proc/stat | awk '{u=$2+$4; t=$2+$4+$5; print int((u-pu)/(t-pt)*100)"%"}' pu=0 pt=0)"
  color = rgba(ffbf00dd)
  font_size = 10
  font_family = JetBrains Mono
  position = 48, 100
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:5000] echo "MEM  // $(free -h | awk '/^Mem/{print $3"/"$2}')"
  color = rgba(ffbf00dd)
  font_size = 10
  font_family = JetBrains Mono
  position = 48, 84
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:60000] echo "DISK // $(df -h / | awk 'NR==2{print $4" free"}')"
  color = rgba(ffbf00dd)
  font_size = 10
  font_family = JetBrains Mono
  position = 48, 68
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:60000] echo "NET  // $(ip route get 1 | awk '{print $7;exit}' 2>/dev/null || echo 'offline')"
  color = rgba(ffbf00dd)
  font_size = 10
  font_family = JetBrains Mono
  position = 48, 52
  halign = left
  valign = bottom
}

