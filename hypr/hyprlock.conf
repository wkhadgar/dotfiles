animation = fade, 1, 4, linear

# BACKGROUND
background {
  monitor =
  path = screenshot
  color = rgba(0a0a0aff)
  blur_passes = 2
}

# ── CENTER: NERV LABEL ──────────────────────────────
label {
  monitor =
  text = [ CASPER-3 ]
  color = rgba(cc0000ff)
  font_size = 16
  font_family = JetBrains Mono
  position = 0, 180
  halign = center
  valign = center
}

label {
  monitor =
  text = ⚠ AUTHORIZED PERSONNEL ONLY ⚠
  color = rgba(666666cc)
  font_size = 11
  font_family = JetBrains Mono
  position = 0, 155
  halign = center
  valign = center
}

# ── CENTER: CLOCK ───────────────────────────────────
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(ffbf00ff)
  font_size = 96
  font_family = JetBrains Mono Bold
  position = 0, 40
  halign = center
  valign = center
}

# ── CENTER: DATE ────────────────────────────────────
label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A // %d %B %Y" | tr '[:lower:]' '[:upper:]')"
  color = rgba(cc0000cc)
  font_size = 13
  font_family = JetBrains Mono
  position = 0, -70
  halign = center
  valign = center
}

# ── CENTER: INPUT FIELD ─────────────────────────────
input-field {
  monitor =
  size = 300, 44
  outline_thickness = 1
  dots_size = 0.25
  dots_spacing = 0.3
  dots_center = true
  outer_color = rgba(ffbf00ff)
  inner_color = rgba(0a0a0aff)
  font_color = rgba(ffbf00ff)
  fade_on_empty = true
  rounding = 0
  check_color = rgba(ffbf00ff)
  fail_color = rgba(cc0000ff)
  placeholder_text = <span foreground="##444444">PASSWORD</span>
  hide_input = false
  position = 0, -140
  halign = center
  valign = center
}

label {
  monitor =
  text = press enter to unlock
  color = rgba(666666cc)
  font_size = 10
  font_family = JetBrains Mono
  position = 0, -195
  halign = center
  valign = center
}

# ── TOP LEFT: MAGI NODE STATUS ──────────────────────
label {
  monitor =
  text = MAGI SYSTEM // UNIT-01
  color = rgba(666666cc)
  font_size = 10
  font_family = JetBrains Mono
  position = 48, -48
  halign = left
  valign = top
}

label {
  monitor =
  # Verifies CASPER-3. If "offline", shows [OFFLINE], else [ONLINE]
  text = cmd[update:30000] tailscale status | grep "casper-3" | grep -q "offline" && echo "CASPER-3    [OFFLINE]" || echo "CASPER-3    [ONLINE]"
  color = rgba(bb0000aa)
  font_size = 10
  font_family = JetBrainsMono Nerd Font
  position = 48, -68
  halign = left
  valign = top
}

label {
  monitor =
  # Verifies BALTHASAR-2
  text = cmd[update:30000] tailscale status | grep "balthasar-2" | grep -q "offline" && echo "BALTHASAR-2 [OFFLINE]" || echo "BALTHASAR-2 [ONLINE]"
  color = rgba(bb0000aa)
  font_size = 10
  font_family = JetBrainsMono Nerd Font
  position = 48, -84
  halign = left
  valign = top
